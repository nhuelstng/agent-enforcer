name: enforcer

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**", "docs/**", "chore/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post comments on (leave empty to just run the full audit)"
        required: false
        default: ""
        type: string
      scan_mode:
        description: "Scan mode: 'all' (full repo, errors only) or 'diff' (PR diff, errors + warnings)"
        required: false
        type: choice
        options:
          - all
          - diff
        default: diff

concurrency:
  group: enforcer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed:
    name: changed-files
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      - uses: ./.github/actions/enforcer
        with:
          install-method: wheel
          base-ref: origin/main

  full:
    name: full-scan
    # Full-repo audit: runs every rule (incl. diff_only) on all lines. Fires on PRs,
    # main pushes, and manual dispatch.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      # Full audit is blocking: the repo is clean under `enforcer check --all`.
      - uses: ./.github/actions/enforcer
        with:
          install-method: wheel
          base-ref: ""

  comment-pr:
    name: post-pr-comments
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      - name: install-deps
        run: pip install dist/*.whl PyGithub
      - name: run-enforcer
        continue-on-error: true
        env:
          SCAN_MODE: ${{ github.event.inputs.scan_mode }}
        run: |
          if [ "$SCAN_MODE" = "all" ]; then
            python -m enforcer.cli check --all --no-llm --severity error --format json --output violations.json
          else
            python -m enforcer.cli check --base-ref origin/main --no-llm --severity warn --format json --output violations.json
          fi
      - name: post-comments
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          SCAN_MODE: ${{ github.event.inputs.scan_mode }}
          PYTHONPATH: "."
        run: |
          python scripts/post_pr_comments.py \
            --json violations.json \
            --pr "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$COMMIT_SHA" \
            --mode "$SCAN_MODE"
