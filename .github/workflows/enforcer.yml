name: enforcer

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**", "docs/**", "chore/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post comments on"
        required: true
        type: string

concurrency:
  group: enforcer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed:
    name: changed-files
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      - uses: ./.github/actions/enforcer
        with:
          install-method: wheel
          base-ref: origin/main

  full:
    name: full-scan
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      - uses: ./.github/actions/enforcer
        with:
          install-method: wheel
          base-ref: ""

  comment-pr:
    name: post-pr-comments
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      - name: install-deps
        run: pip install dist/*.whl PyGithub
      - name: run-enforcer
        run: |
          python -m enforcer.cli check --all --no-llm --format json --output violations.json
      - name: post-comments
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python scripts/post_pr_comments.py \
            --json violations.json \
            --pr "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$COMMIT_SHA"
