name: enforcer

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**", "docs/**", "chore/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: enforcer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed:
    name: changed-files
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      - uses: ./.github/actions/enforcer
        with:
          install-method: wheel
          base-ref: origin/main

  full:
    name: full-scan
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build-wheel
        run: pip install build && python -m build --wheel
      - uses: ./.github/actions/enforcer
        with:
          install-method: wheel
          base-ref: ""
