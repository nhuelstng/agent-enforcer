name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.1.0 or 0.2.0). Defaults to pyproject version."
        required: false

permissions:
  contents: write

jobs:
  check-version:
    name: detect-new-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should-release: ${{ steps.version.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: version
        run: |
          # Extract version = "X.Y.Z" from pyproject.toml. No tomllib dependency
          # needed — a single sed is deterministic for the static version field.
          VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::No version found in pyproject.toml" >&2
            exit 1
          fi

          # Manual dispatch override
          INPUT_TAG="${{ inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            VERSION="$INPUT_TAG"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if a tag already exists for this version. If yes, skip —
          # already released. Idempotent so re-pushing main without a version
          # bump doesn't churn releases.
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $VERSION already exists. Skipping release."
          else
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "No tag $VERSION found. Will release."
          fi

  build:
    name: build-wheel
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: create-release
    needs: [check-version, build]
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create tag + release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
