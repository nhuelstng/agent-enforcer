name: enforcer
description: Run pre-commit-agent-enforcer convention checks

inputs:
  install-method:
    description: How to install enforcer. skip | pip | wheel
    default: pip
  version:
    description: Enforcer version (git ref) to install. Ignored when install-method=wheel.
    default: "0.2.0"
  base-ref:
    description: Git ref to diff against. Empty = full scan (--all)
    default: ""
  severity:
    description: Minimum severity to report
    default: error
  token:
    description: GitHub token for private repo checkout (cross-org). Only needed for private forks of the enforcer repo.
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: install
      shell: bash
      env:
        INSTALL_METHOD: ${{ inputs.install-method }}
        GH_TOKEN: ${{ inputs.token }}
        VERSION: ${{ inputs.version }}
      run: |
        case "$INSTALL_METHOD" in
          skip) echo "skip install" ;;
          wheel)
            if ! ls dist/*.whl >/dev/null 2>&1; then
              echo "::error::install-method=wheel but no dist/*.whl found. Build the wheel first." >&2
              exit 1
            fi
            pip install dist/*.whl ;;
          pip)
            if [ -n "$GH_TOKEN" ] && [ "$GH_TOKEN" != "${{ github.token }}" ]; then
              pip install "git+https://x-access-token:${GH_TOKEN}@github.com/nhuelstng/agent-enforcer.git@${VERSION}"
            else
              pip install "git+https://github.com/nhuelstng/agent-enforcer.git@${VERSION}"
            fi ;;
        esac

    - name: run-enforcer
      id: run-enforcer
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
        SEVERITY: ${{ inputs.severity }}
      run: |
        ARGS="--severity $SEVERITY --no-llm --format sarif --output enforcer-results.sarif"
        if [ -n "$BASE_REF" ]; then
          ARGS="$ARGS --base-ref $BASE_REF"
        else
          ARGS="$ARGS --all"
        fi
        python -m enforcer.cli check $ARGS
      continue-on-error: true

    - name: upload-sarif
      if: always() && steps.run-enforcer.outcome != 'skipped'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: enforcer-results.sarif
      continue-on-error: true

    - name: fail-on-violations
      if: steps.run-enforcer.outcome == 'failure'
      shell: bash
      run: exit 1
