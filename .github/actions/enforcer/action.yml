name: enforcer
description: Run pre-commit-agent-enforcer convention checks

inputs:
  install-method:
    description: How to install enforcer. skip | pip | wheel
    default: pip
  base-ref:
    description: Git ref to diff against. Empty = full scan (--all)
    default: ""
  severity:
    description: Minimum severity to report
    default: error
  token:
    description: GitHub token for private repo checkout (cross-org)
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: install
      shell: bash
      env:
        INSTALL_METHOD: ${{ inputs.install-method }}
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
      run: |
        case "$INSTALL_METHOD" in
          skip) echo "skip install" ;;
          wheel)
            pip install dist/*.whl ;;
          pip)
            pip install "git+https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git@${SHA}" ;;
        esac

    - name: run-enforcer
      id: run-enforcer
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
        SEVERITY: ${{ inputs.severity }}
      run: |
        ARGS="--severity $SEVERITY --no-llm --format sarif --output enforcer-results.sarif"
        if [ -n "$BASE_REF" ]; then
          ARGS="$ARGS --base-ref $BASE_REF"
        else
          ARGS="$ARGS --all"
        fi
        python -m enforcer.cli check $ARGS
      continue-on-error: true

    - name: upload-sarif
      if: always() && steps.run-enforcer.outcome != 'skipped'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: enforcer-results.sarif

    - name: fail-on-violations
      if: steps.run-enforcer.outcome == 'failure'
      shell: bash
      run: exit 1
